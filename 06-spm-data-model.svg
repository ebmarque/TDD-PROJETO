<svg xmlns="http://www.w3.org/2000/svg" width="680" height="420" viewBox="0 0 680 420" role="img">
<title>SPM data model — key tables and relationships</title>
<desc>Three grouped areas: SPM core, where a Demand converts to a Project; Financial planning, where cost, benefit and expense tables roll up into an Investment object; and Portfolio alignment, whose mirror tables and planning item stay in sync with the core and the investment.</desc>
<style>
 text{font-family:Aptos,'Segoe UI',Arial,sans-serif;}
 .title{font-size:15px;font-weight:600;fill:#E97132;}
 .t{font-size:14px;fill:#16161D;}
 .ts{font-size:12px;fill:#5A6B7B;}
 .th{font-size:14px;font-weight:600;fill:#0E2841;}
 rect.box{fill:#EAEEF2;stroke:#0E2841;stroke-width:1;}
 rect.panel{fill:#F2F5F8;stroke:none;}
 .core rect{fill:#0E2841;stroke:#0E2841;stroke-width:1;} .core text{fill:#FFFFFF;}
</style>
<defs>
 <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#45566A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
 <marker id="arrowGray" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8A97A6" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>
<text class="title" x="40" y="28">SPM data model — key tables &amp; relationships</text>
<text class="ts" x="40" y="48">Navy = SPM core (Demand → Project) · solid ▶ = 1:N / creates · dashed = mirror &amp; sync</text>
<rect class="panel" x="40" y="70" width="260" height="126" rx="10"/>
<text class="th" x="52" y="90">SPM core</text>
<g class="core"><rect x="70" y="100" width="200" height="38" rx="7"/><text class="th" x="170" y="119" text-anchor="middle" fill="#FFFFFF">Demand</text><text class="ts" x="170" y="132" text-anchor="middle" fill="#FFFFFF">dmn_demand</text></g>
<g class="core"><rect x="70" y="152" width="200" height="38" rx="7"/><text class="th" x="170" y="171" text-anchor="middle" fill="#FFFFFF">Project</text><text class="ts" x="170" y="184" text-anchor="middle" fill="#FFFFFF">pm_project</text></g>
<line x1="170" y1="138" x2="170" y2="152" stroke="#45566A" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<text class="ts" x="178" y="148">converts (1:1)</text>
<rect class="panel" x="40" y="210" width="260" height="182" rx="10"/>
<text class="th" x="52" y="230">Financial planning</text>
<g><rect class="box" x="54" y="242" width="112" height="40" rx="7"/><text class="th" x="110" y="261" text-anchor="middle">Cost plan</text><text class="ts" x="110" y="275" text-anchor="middle">cost_plan</text></g>
<g><rect class="box" x="176" y="242" width="112" height="40" rx="7"/><text class="th" x="232" y="261" text-anchor="middle">Benefit plan</text><text class="ts" x="232" y="275" text-anchor="middle">benefit_plan</text></g>
<g><rect class="box" x="54" y="292" width="112" height="40" rx="7"/><text class="th" x="110" y="311" text-anchor="middle">Expense line</text><text class="ts" x="110" y="325" text-anchor="middle">fm_expense_line</text></g>
<g><rect class="box" x="54" y="342" width="234" height="40" rx="7"/><text class="th" x="171" y="361" text-anchor="middle">Investment</text><text class="ts" x="171" y="375" text-anchor="middle">sn_invst_pln_invst_investment</text></g>
<line x1="110" y1="282" x2="128" y2="342" stroke="#45566A" stroke-width="1.3" fill="none" marker-end="url(#arrow)"/>
<line x1="232" y1="282" x2="205" y2="342" stroke="#45566A" stroke-width="1.3" fill="none" marker-end="url(#arrow)"/>
<text class="ts" x="150" y="316">rollup</text>
<rect class="panel" x="330" y="70" width="310" height="322" rx="10"/>
<text class="th" x="342" y="90">Portfolio alignment</text>
<g><rect class="box" x="344" y="100" width="284" height="40" rx="7"/><text class="th" x="358" y="119">Align demand</text><text class="ts" x="358" y="133">sn_align_core_demand</text></g>
<g><rect class="box" x="344" y="152" width="284" height="40" rx="7"/><text class="th" x="358" y="171">Align project</text><text class="ts" x="358" y="185">sn_align_core_project</text></g>
<g><rect class="box" x="344" y="300" width="284" height="40" rx="7"/><text class="th" x="358" y="319">Planning item</text><text class="ts" x="358" y="333">sn_align_core_planning_item</text></g>
<line x1="270" y1="118" x2="342" y2="120" stroke="#8A97A6" stroke-width="1.3" fill="none" stroke-dasharray="4 3" marker-end="url(#arrowGray)"/>
<text class="ts" x="286" y="112">mirror</text>
<line x1="270" y1="170" x2="342" y2="172" stroke="#8A97A6" stroke-width="1.3" fill="none" stroke-dasharray="4 3" marker-end="url(#arrowGray)"/>
<text class="ts" x="286" y="164">mirror</text>
<line x1="170" y1="190" x2="170" y2="210" stroke="#45566A" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<text class="ts" x="178" y="205">cost &amp; benefit plans (1:N)</text>
<line x1="288" y1="360" x2="342" y2="320" stroke="#8A97A6" stroke-width="1.3" fill="none" stroke-dasharray="4 3" marker-end="url(#arrowGray)"/>
<text class="ts" x="292" y="348">sync (1:1)</text>
</svg>
