<svg xmlns="http://www.w3.org/2000/svg" width="680" height="350" viewBox="0 0 680 350" role="img">
<title>Project lifecycle — states and phases</title>
<desc>Top row: project states from Pending and Open to Work in progress, then Closed complete, with a Closed incomplete branch and an on-hold return to Pending. Bottom row: the five execution phases — Initiating, Planning, Executing, Delivering, Closing — each transition passing a Quality Gate.</desc>
<style>
 text{font-family:Aptos,'Segoe UI',Arial,sans-serif;}
 .title{font-size:15px;font-weight:600;fill:#E97132;}
 .t{font-size:14px;fill:#16161D;}
 .ts{font-size:12px;fill:#5A6B7B;}
 .th{font-size:14px;font-weight:600;fill:#0E2841;}
 rect.box{fill:#EAEEF2;stroke:#0E2841;stroke-width:1;}
 .c-green rect{fill:#E1EFE3;stroke:#2E7D46;stroke-width:1;} .c-green text{fill:#1E5631;}
 .c-red rect{fill:#F7E3E3;stroke:#C0392B;stroke-width:1;} .c-red text{fill:#922B21;}
</style>
<defs>
 <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#45566A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
 <marker id="arrowRed" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#C0392B" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
 <marker id="arrowGray" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8A97A6" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>
<text class="title" x="40" y="28">Project lifecycle — states &amp; phases</text>
<text class="ts" x="40" y="48">Green = closed complete · red = closed incomplete · phases advance through Quality Gates (QG)</text>
<g><rect class="box" x="40" y="72" width="102" height="46" rx="8"/><text class="th" x="91" y="92" text-anchor="middle">Pending</text><text class="ts" x="91" y="108" text-anchor="middle">On hold</text></g>
<g><rect class="box" x="196" y="72" width="102" height="46" rx="8"/><text class="th" x="247" y="92" text-anchor="middle">Open</text><text class="ts" x="247" y="108" text-anchor="middle">Filling info</text></g>
<g><rect class="box" x="352" y="72" width="142" height="46" rx="8"/><text class="th" x="423" y="92" text-anchor="middle">Work in progress</text><text class="ts" x="423" y="108" text-anchor="middle">In execution</text></g>
<g class="c-green"><rect x="540" y="72" width="100" height="46" rx="8"/><text class="th" x="590" y="92" text-anchor="middle">Closed</text><text class="ts" x="590" y="108" text-anchor="middle" fill="#1E5631">Complete</text></g>
<g class="c-red"><rect x="540" y="140" width="100" height="46" rx="8"/><text class="th" x="590" y="160" text-anchor="middle">Closed</text><text class="ts" x="590" y="176" text-anchor="middle" fill="#922B21">Incomplete</text></g>
<line x1="142" y1="95" x2="196" y2="95" stroke="#45566A" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<text class="ts" x="169" y="88" text-anchor="middle">start</text>
<line x1="298" y1="95" x2="352" y2="95" stroke="#45566A" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<text class="ts" x="325" y="88" text-anchor="middle">update</text>
<line x1="494" y1="95" x2="540" y2="95" stroke="#45566A" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<text class="ts" x="517" y="88" text-anchor="middle">close</text>
<line x1="470" y1="118" x2="548" y2="150" stroke="#C0392B" stroke-width="1.5" fill="none" marker-end="url(#arrowRed)"/>
<text class="ts" x="474" y="134">cancel</text>
<path d="M400 118 L400 136 L100 136 L100 118" fill="none" stroke="#8A97A6" stroke-width="1.3" stroke-dasharray="4 3" marker-end="url(#arrowGray)"/>
<text class="ts" x="230" y="131" text-anchor="middle">on hold</text>
<text class="ts" x="40" y="222">Work in progress advances through five phases — each transition passes a Quality Gate (QG):</text>
<g><rect class="box" x="40" y="240" width="96" height="44" rx="8"/><text class="th" x="88" y="267" text-anchor="middle">Initiating</text></g>
<g><rect class="box" x="163" y="240" width="96" height="44" rx="8"/><text class="th" x="211" y="267" text-anchor="middle">Planning</text></g>
<g><rect class="box" x="286" y="240" width="96" height="44" rx="8"/><text class="th" x="334" y="267" text-anchor="middle">Executing</text></g>
<g><rect class="box" x="409" y="240" width="96" height="44" rx="8"/><text class="th" x="457" y="267" text-anchor="middle">Delivering</text></g>
<g><rect class="box" x="532" y="240" width="96" height="44" rx="8"/><text class="th" x="580" y="267" text-anchor="middle">Closing</text></g>
<line x1="136" y1="262" x2="163" y2="262" stroke="#45566A" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<text class="ts" x="149" y="256" text-anchor="middle">QG</text>
<line x1="259" y1="262" x2="286" y2="262" stroke="#45566A" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<text class="ts" x="272" y="256" text-anchor="middle">QG</text>
<line x1="382" y1="262" x2="409" y2="262" stroke="#45566A" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<text class="ts" x="395" y="256" text-anchor="middle">QG</text>
<line x1="505" y1="262" x2="532" y2="262" stroke="#45566A" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<text class="ts" x="518" y="256" text-anchor="middle">QG</text>
<text class="ts" x="40" y="316">Note: a non-pending project with no update for one month notifies the Project Manager.</text>
</svg>
