<svg xmlns="http://www.w3.org/2000/svg" width="680" height="540" viewBox="0 0 680 540" role="img">
<title>Demand lifecycle and approval flow</title>
<desc>Vertical state flow: Raised, Submitted, Qualified, then Completed and auto-created as a Project, with a Rejected branch and a Rework loop. Approval runs on sysapproval_approver; the dmn_decision record is logged at conversion for documentation only.</desc>
<style>
 text{font-family:Aptos,'Segoe UI',Arial,sans-serif;}
 .title{font-size:15px;font-weight:600;fill:#E97132;}
 .t{font-size:14px;fill:#16161D;}
 .ts{font-size:12px;fill:#5A6B7B;}
 .th{font-size:14px;font-weight:600;fill:#0E2841;}
 rect.box{fill:#EAEEF2;stroke:#0E2841;stroke-width:1;}
 .c-green rect{fill:#E1EFE3;stroke:#2E7D46;stroke-width:1;} .c-green text{fill:#1E5631;}
 .c-red rect{fill:#F7E3E3;stroke:#C0392B;stroke-width:1;} .c-red text{fill:#922B21;}
</style>
<defs>
 <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#45566A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
 <marker id="arrowRed" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#C0392B" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
 <marker id="arrowGray" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8A97A6" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>
<text class="title" x="40" y="30">Demand lifecycle &amp; approval flow</text>
<text class="ts" x="40" y="50">Boxes = states · arrows = action (responsible persona) · green = approved · red = rejected</text>
<g><rect class="box" x="100" y="76" width="200" height="54" rx="8"/><text class="th" x="200" y="101" text-anchor="middle">Raised</text><text class="ts" x="200" y="119" text-anchor="middle">Draft + mandatory info</text></g>
<g><rect class="box" x="100" y="168" width="200" height="54" rx="8"/><text class="th" x="200" y="193" text-anchor="middle">Submitted</text><text class="ts" x="200" y="211" text-anchor="middle">Awaiting qualification</text></g>
<g><rect class="box" x="100" y="260" width="200" height="54" rx="8"/><text class="th" x="200" y="285" text-anchor="middle">Qualified</text><text class="ts" x="200" y="303" text-anchor="middle">Ready for approval</text></g>
<g class="c-green"><rect x="100" y="352" width="200" height="54" rx="8"/><text class="th" x="200" y="377" text-anchor="middle">Completed</text><text class="ts" x="200" y="395" text-anchor="middle" fill="#1E5631">Approved initiative</text></g>
<g class="c-green"><rect x="100" y="444" width="200" height="54" rx="8"/><text class="th" x="200" y="469" text-anchor="middle">Project</text><text class="ts" x="200" y="487" text-anchor="middle" fill="#1E5631">pm_project</text></g>
<g class="c-red"><rect x="430" y="260" width="190" height="54" rx="8"/><text class="th" x="525" y="285" text-anchor="middle">Rejected</text><text class="ts" x="525" y="303" text-anchor="middle" fill="#922B21">Not approved</text></g>
<line x1="200" y1="130" x2="200" y2="166" stroke="#45566A" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<text class="t" x="250" y="146">Submit demand</text><text class="ts" x="250" y="162">Demand Creator</text>
<line x1="200" y1="222" x2="200" y2="258" stroke="#45566A" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<text class="t" x="250" y="238">Qualify</text><text class="ts" x="250" y="254">Demand Manager</text>
<line x1="200" y1="314" x2="200" y2="350" stroke="#45566A" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<text class="t" x="250" y="330">Approve</text><text class="ts" x="250" y="346">Demand Approver</text>
<line x1="200" y1="406" x2="200" y2="442" stroke="#45566A" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<text class="ts" x="250" y="420">Auto-created by business rule</text>
<text class="ts" x="250" y="434">dmn_decision logged (documentation)</text>
<line x1="300" y1="287" x2="428" y2="287" stroke="#C0392B" stroke-width="1.5" fill="none" marker-end="url(#arrowRed)"/>
<text class="ts" x="312" y="280">Reject · Approver</text>
<path d="M100 300 L68 300 L68 196 L100 196" fill="none" stroke="#8A97A6" stroke-width="1.3" stroke-dasharray="4 3" marker-end="url(#arrowGray)"/>
<text class="ts" x="56" y="248" text-anchor="middle" transform="rotate(-90 56 248)">Rework</text>
<g><rect class="box" x="350" y="352" width="286" height="62" rx="8"/><text class="th" x="364" y="373">Approval mechanics</text><text class="ts" x="364" y="391">Approval via sysapproval_approver</text><text class="ts" x="364" y="407">Approvers must be SPM Approvers</text></g>
</svg>
